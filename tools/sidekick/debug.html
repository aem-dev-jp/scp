<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sidekick debug</title>
  <style>
    body { font: 14px/1.5 system-ui, sans-serif; margin: 1rem; }
    .ok { color: #0a0; font-weight: 600; }
    pre { background: #f4f4f4; padding: 0.75rem; overflow: auto; font-size: 12px; word-break: break-all; }
  </style>
</head>
<body>
  <p class="ok">Sidekick からこの HTML が読めています（プラグイン設定は有効）。</p>
  <p>切り分け: このボタンだけ見える → Preview&amp;Publish 側（URL 長・パレット JS）を疑う。<br />
  どちらも見えない → config.json が読み込まれていない／環境・キャッシュを疑う。</p>
  <p>クエリ（passConfig 時）:</p>
  <pre id="q"></pre>
  <script type="module">
    document.getElementById('q').textContent = window.location.search || '(なし)';
  </script>
</body>
</html>
